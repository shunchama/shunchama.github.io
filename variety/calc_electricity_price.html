<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>簡易・電気料金計算機</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f4f4f4;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px; /* カードの最大幅を設定 */
        margin: 20px auto; /* 上下20px、左右autoで中央寄せ */
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      input,
      button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>電気料金計算</h2>
      <label>消費電力 (W):</label>
      <input type="number" id="watts" value="300" />

      <label>使用時間 (時間/日):</label>
      <input type="number" id="hours" value="1" />

      <label>1kWhあたりの単価 (円):</label>
      <input
        type="number"
        id="ratePerkWh"
        value="31"
        step="0.1"
        oninput="calculate()"
      />
      <p
        style="
          font-size: 0.9em;
          color: #666;
          margin-top: -5px;
          margin-bottom: 10px;
        "
      >
        ※参考: 全国家庭電気製品公正取引協議会目安 31円/kWh
      </p>

      <label>計算日数:</label>
      <input type="number" id="days" value="1" min="1" oninput="calculate()" />

      <button onclick="calculate()">計算する</button>

      <h3 id="result">料金: - 円</h3>

      <hr />
      <div>計算式: (W ÷ 1000) × 時間 × 単価 × 日数</div>
      <hr />

      <h3>主要電力会社の料金ページ</h3>
      <ul style="list-style-type: none; padding: 0">
        <li>
          <a
            href="https://www.tepco.co.jp/ep/private/plan/index.html"
            target="_blank"
            >東京電力エナジーパートナー</a
          >
        </li>
        <li><a href="https://kepco.jp/ryokin/" target="_blank">関西電力</a></li>
        <li>
          <a href="https://www.chuden.co.jp/ryokin/" target="_blank"
            >中部電力ミライズ</a
          >
        </li>
        <li>
          <a href="https://kyuden.co.jp/rate/" target="_blank">九州電力</a>
        </li>
        <li>
          <a
            href="https://www.tohoku-epco.co.jp/d_ryokin/index.html"
            target="_blank"
            >東北電力</a
          >
        </li>
        <li>
          <a href="https://www.rikuden.co.jp/ryokin/" target="_blank"
            >北陸電力</a
          >
        </li>
        <li>
          <a
            href="https://www.hepco.co.jp/home/ryokin/index.html"
            target="_blank"
            >北海道電力</a
          >
        </li>
        <li>
          <a
            href="https://www.energia.co.jp/e/home/ryokin/index.html"
            target="_blank"
            >中国電力</a
          >
        </li>
        <li>
          <a href="https://www.yonden.co.jp/ryokin/index.html" target="_blank"
            >四国電力</a
          >
        </li>
        <li>
          <a href="https://www.okiden.co.jp/charge/index.html" target="_blank"
            >沖縄電力</a
          >
        </li>
        <!-- 必要に応じて他の電力会社も追加してください -->
      </ul>
    </div>

    <script>
      function calculate() {
        // 入力値を取得
        const watts = parseFloat(document.getElementById("watts").value);
        const hours = parseFloat(document.getElementById("hours").value);
        const ratePerkWh = parseFloat(
          document.getElementById("ratePerkWh").value,
        );
        const days = parseFloat(document.getElementById("days").value);

        // 入力値のバリデーション (負の数やNaNを防ぐ)
        if (isNaN(watts) || watts < 0) {
          document.getElementById("result").innerText =
            "消費電力は0以上の数値を入力してください。";
          return;
        }
        if (isNaN(hours) || hours < 0) {
          document.getElementById("result").innerText =
            "使用時間は0以上の数値を入力してください。";
          return;
        }
        if (isNaN(ratePerkWh) || ratePerkWh < 0) {
          document.getElementById("result").innerText =
            "単価は0以上の数値を入力してください。";
          return;
        }
        if (isNaN(days) || days < 1) {
          document.getElementById("result").innerText =
            "日数は1以上の数値を入力してください。";
          return;
        }

        // 計算ロジック: (W ÷ 1000) × 時間 × 単価 × 日数
        const kWhPerDay = (watts / 1000) * hours;
        const rawPrice = kWhPerDay * ratePerkWh * days;
        const price = rawPrice.toLocaleString(undefined, {
          minimumFractionDigits: 1,
          maximumFractionDigits: 1,
        }); // 3桁区切りと小数第一位表示

        // 結果を表示
        document.getElementById("result").innerText =
          `料金: 約 ${price} 円 / ${days} 日間`;
      }

      // ページ読み込み時と電力会社選択時に計算を実行
      window.onload = function () {
        calculate();
      };
    </script>
  </body>
</html>
