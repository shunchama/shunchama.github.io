<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHINA-MAP-MASTER</title>
    <style>
      :root {
        --primary: #c0392b; /* 中国紅 */
        --secondary: #f1c40f; /* 旗の黄色 */
        --accent: #e67e22;
        --review: #f1c40f;
        --bg: #fdf2e9;
      }
      body {
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        text-align: center;
        background: var(--bg);
        margin: 0;
        padding: 0;
      }

      nav {
        background: #fff;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: center;
        gap: 20px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-btn {
        padding: 10px 20px;
        cursor: pointer;
        border: none;
        background: none;
        font-size: 16px;
        font-weight: bold;
        color: #7f8c8d;
        border-bottom: 3px solid transparent;
      }
      .nav-btn.active {
        color: var(--primary);
        border-bottom: 3px solid var(--primary);
      }

      .container {
        max-width: 800px;
        margin: 20px auto;
        padding: 15px;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      .panel {
        background: white;
        max-width: 550px;
        margin: 0 auto 20px;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      }

      /* Map Display Area */
      .map-box {
        width: 100%;
        height: 300px;
        background: #eef2f3;
        border-radius: 15px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #map-img {
        max-width: 95%;
        max-height: 95%;
        filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.1));
      }

      #answer-area {
        min-height: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .review-toggle {
        background: none;
        border: 2px solid var(--review);
        color: var(--review);
        padding: 6px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .review-toggle.active {
        background: var(--review);
        color: white;
      }

      #action-btn {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        cursor: pointer;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 0 #922b21;
      }
      #action-btn:active {
        transform: translateY(2px);
        box-shadow: none;
      }

      /* List Grid */
      .list-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      .list-item {
        background: white;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      .list-item img {
        width: 100%;
        height: 80px;
        object-fit: contain;
      }

      footer {
        margin-top: 40px;
        padding: 20px;
        color: #7f8c8d;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <nav>
      <button
        class="nav-btn"
        onclick="location.href = 'https://shunchama.github.io/geo/'"
      >
        ポータル
      </button>
      <button class="nav-btn active" onclick="showPage('quiz-page', this)">
        場所クイズ
      </button>
      <button class="nav-btn" onclick="showPage('list-page', this)">
        省別一覧
      </button>
    </nav>

    <div class="container">
      <div id="quiz-page" class="page active">
        <div class="panel">
          <div
            id="progress"
            style="margin-bottom: 10px; font-weight: bold; color: #555"
          >
            0 / 0
          </div>
          <div class="map-box">
            <img id="map-img" src="" alt="China Map Highlight" />
          </div>

          <div id="answer-area">
            <button
              id="review-btn"
              class="review-toggle"
              onclick="toggleReview()"
            >
              ☆ 復習に追加
            </button>
            <p
              id="name-jp"
              style="font-size: 26px; font-weight: bold; margin: 0"
            ></p>
            <p
              id="name-cn"
              style="color: var(--primary); font-size: 18px; margin: 5px 0"
            ></p>
            <p id="name-en" style="color: #95a5a6; margin: 5px 0"></p>
          </div>

          <button id="action-btn">答えを見る</button>
        </div>
      </div>

      <div id="list-page" class="page">
        <div class="list-grid" id="list-container"></div>
      </div>
    </div>

        },
      ];

      let quizList = [];
      let currentIdx = 0;
      let isShowingAnswer = false;
      let reviewedIds =
        JSON.parse(localStorage.getItem("chinaMapReview")) || [];

      function showPage(pageId, btn) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      }

      function init() {
        quizList = [...provinces].sort(() => Math.random() - 0.5);
        showQuestion();
        renderList();
      }

      function showQuestion() {
        isShowingAnswer = false;
        const p = quizList[currentIdx];
        document.getElementById("map-img").src = p.img;
        document.getElementById("name-jp").textContent = "";
        document.getElementById("name-cn").textContent = "";
        document.getElementById("name-en").textContent = "";
        document.getElementById("action-btn").textContent = "答えを見る";
        document.getElementById("progress").textContent =
          `問題: ${currentIdx + 1} / ${quizList.length}`;
        updateReviewBtnUI();
      }

      document.getElementById("action-btn").onclick = () => {
        if (!isShowingAnswer) {
          const p = quizList[currentIdx];
          document.getElementById("name-jp").textContent = p.jp;
          document.getElementById("name-cn").textContent = p.cn;
          document.getElementById("name-en").textContent = p.id;
          document.getElementById("action-btn").textContent = "次へ";
          isShowingAnswer = true;
        } else {
          currentIdx = (currentIdx + 1) % quizList.length;
          showQuestion();
        }
      };

      function toggleReview() {
        const id = quizList[currentIdx].id;
        const idx = reviewedIds.indexOf(id);
        if (idx > -1) reviewedIds.splice(idx, 1);
        else reviewedIds.push(id);
        localStorage.setItem("chinaMapReview", JSON.stringify(reviewedIds));
        updateReviewBtnUI();
        renderList();
      }

      function updateReviewBtnUI() {
        const btn = document.getElementById("review-btn");
        if (reviewedIds.includes(quizList[currentIdx].id)) {
          btn.classList.add("active");
          btn.textContent = "★ 復習中";
        } else {
          btn.classList.remove("active");
          btn.textContent = "☆ 復習に追加";
        }
      }

      function renderList() {
        const container = document.getElementById("list-container");
        container.innerHTML = "";
        provinces.forEach((p) => {
          const div = document.createElement("div");
          div.className = "list-item";
          const star = reviewedIds.includes(p.id)
            ? '<span style="color:var(--review); float:right;">★</span>'
            : "";
          div.innerHTML = `${star}<img src="${p.img}"><div style="font-weight:bold; font-size:12px;">${p.jp}</div>`;
          container.appendChild(div);
        });
      }

      init();
